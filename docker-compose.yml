version: '3.8'

services:
  app:
    build:
      context: ./docker/php
      dockerfile: Dockerfile
    container_name: logic-app
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html
    networks:
      - logic-network
    depends_on:
      - mysql

  apache:
    build:
      context: ./docker/apache
      dockerfile: Dockerfile
    container_name: logic-apache
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - ./:/var/www/html
      - ./docker/apache/vhost.conf:/usr/local/apache2/conf/extra/httpd-vhosts.conf
    networks:
      - logic-network
    depends_on:
      - app

  mysql:
    image: mysql:8.0
    container_name: logic-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: logic_laravel
      MYSQL_ROOT_PASSWORD: secret
      MYSQL_USER: logic
      MYSQL_PASSWORD: secret
    ports:
      - "3307:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    networks:
      - logic-network

  phpmyadmin:
    image: phpmyadmin:latest
    container_name: logic-phpmyadmin
    restart: unless-stopped
    ports:
      - "8080:80"
    environment:
      PMA_HOST: mysql
      PMA_USER: logic
      PMA_PASSWORD: secret
    networks:
      - logic-network
    depends_on:
      - mysql

networks:
  logic-network:
    driver: bridge

volumes:
  mysql-data:
